sylius_pdf:
    default:
        adapter: dompdf
        storage:
            type: filesystem
            directory: '%kernel.cache_dir%/pdf'
    contexts:
        invoice:
            adapter: dompdf
            storage:
                type: flysystem
                filesystem: invoice.storage
                prefix: invoices
                local_cache_directory: '%kernel.cache_dir%/pdf_local_cache'
